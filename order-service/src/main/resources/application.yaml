spring:
  application:
    name: order-service
server:
  port: 8081
management:
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318
logging:
  file:
    name: ../logs/order-service.log
  pattern:
    file: "ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} traceId=%X{traceId:-} spanId=%X{spanId:-} parentSpanId=%X{parentSpanId:-} correlationId=%X{correlationId:-} logger=%logger{36} msg=\"%replace(%msg){'\"','\\\\\"'}\"%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{traceId:-}] [%X{spanId:-}] [%X{parentSpanId:-}] [%X{correlationId:-}] [${spring.application.name}] %logger{36} - %msg%n"
