spring:
  application:
    name: pricing-service
server:
  port: 8083
management:
  tracing:
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{traceId:-}] [%X{spanId:-}] [%X{parentSpanId:-}] [%X{correlationId:-}] [${spring.application.name}] %logger{36} - %msg%n"
